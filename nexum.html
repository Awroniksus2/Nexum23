<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nexum — Telegram-бот для збору анамнезу пацієнтів</title>
<meta name="description" content="Nexum — Telegram-бот, що збирає анамнез пацієнтів до прийому."/>
<meta name="robots" content="index, follow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#05070e;--surface:#0b0f1c;--card:#0f1525;--border:#1a2540;--accent:#3b82f6;--accent2:#06d6a0;--warn:#f59e0b;--text:#dde4f0;--muted:#5a6e94;--white:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── EN FONT OVERRIDES ── */
body.en{font-family:'Lora',serif;letter-spacing:.01em;}
/* h1 stays Syne (same as Ukrainian) for visual consistency */
body.en .nav-logo,body.en h2,body.en h3,body.en h4,body.en .pc-name,body.en .hs-title,body.en .faq-q-text,body.en .modal-title{font-family:'Playfair Display',serif;letter-spacing:-.02em;}
body.en .nav-logo span{font-family:'Playfair Display',serif;}
body.en .nav-links a,body.en .btn-ghost,body.en .btn-accent,body.en .btn-big,body.en .btn-big2,body.en .sub-btn,body.en .fc-tab,body.en .inp,body.en select{font-family:'Lora',serif;}
body.en .lang-btn,body.en .sec-lbl,body.en .hn-v,body.en .pc-main,body.en .faq-num,body.en .faq-stat-val,body.en .rs-n,body.en .fsm-n,body.en .chat-summary-title,body.en .chat-sum-val,body.en code{font-family:'DM Mono',monospace;}
/* h1 uses Syne in both languages — same bold/chunky look */
body.en h1{font-family:'Syne',sans-serif !important;font-weight:800;letter-spacing:-.04em;line-height:1.03;}
body.en h2{letter-spacing:-.02em;}
body.en .hero-desc,body.en .faq-aside-desc,body.en .hs-desc,body.en .ac p,body.en .fi span,body.en .pc-desc,body.en .rs-t{font-family:'Lora',serif;font-weight:400;line-height:1.85;}

/* ── LANGUAGE SWITCHER ── */
.lang-switch{display:flex;align-items:center;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;}
.lang-btn{background:transparent;border:none;color:var(--muted);font-size:11.5px;font-weight:600;font-family:'JetBrains Mono',monospace;padding:5px 11px;cursor:pointer;transition:all .15s;letter-spacing:.04em;}
.lang-btn:hover{color:var(--text);}
.lang-btn.active{background:var(--accent);color:#fff;}
.lang-btn:first-child{border-right:1px solid var(--border);}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;backdrop-filter:blur(24px);background:#05070ecc;border-bottom:1px solid var(--border);padding:0 56px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white);letter-spacing:-.03em;display:flex;align-items:center;gap:10px;}
.nav-logo span{color:var(--accent2);}
.nav-links{display:flex;gap:30px;}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--text);}
.nav-right{display:flex;gap:10px;align-items:center;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 18px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-accent{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-accent:hover{opacity:.85;}

/* ── HERO ── */
.hero{max-width:1280px;margin:0 auto;padding:140px 56px 90px;display:grid;grid-template-columns:1fr 420px;gap:72px;align-items:center;}
h1{font-family:'Syne',sans-serif;font-size:clamp(30px,5vw,50px);font-weight:800;line-height:1.03;letter-spacing:-.04em;color:var(--white);}
h1 .bl{color:var(--accent);}h1 .gr{color:var(--accent2);}
.hero-desc{font-size:16px;color:var(--muted);line-height:1.8;margin-top:20px;max-width:460px;font-weight:300;}
.hero-btns{display:flex;gap:12px;margin-top:34px;flex-wrap:wrap;}
.btn-big{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:14px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-big:hover{transform:translateY(-2px);box-shadow:0 10px 32px #3b82f650;}
.btn-big2{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:14px 28px;font-size:14px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;}
.btn-big2:hover{border-color:var(--accent2);color:var(--accent2);}
.hero-nums{display:flex;gap:40px;margin-top:48px;padding-top:40px;border-top:1px solid var(--border);}
.hn-v{font-family:'JetBrains Mono',monospace;font-size:28px;color:var(--white);font-weight:500;}
.hn-v b{color:var(--accent2);}
.hn-l{font-size:11px;color:var(--muted);margin-top:4px;}

/* ── CHAT MOCK ── */
.chat-mock{background:var(--card);border-radius:22px;border:1px solid var(--border);overflow:hidden;box-shadow:0 32px 100px #000a;display:flex;flex-direction:column;max-height:520px;}
.cm-bar{background:var(--surface);padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cm-dots{display:flex;gap:5px;}.cm-dot{width:10px;height:10px;border-radius:50%;}
.cm-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.cm-name{font-size:13px;font-weight:600;color:var(--white);}
.cm-sub{font-size:10px;color:var(--muted);}
.cm-live{width:8px;height:8px;background:var(--accent2);border-radius:50%;margin-left:auto;}
.chat-progress{height:2px;background:var(--border);flex-shrink:0;}
.chat-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease;border-radius:0 2px 2px 0;}
.cm-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.cm-body::-webkit-scrollbar{width:2px;}
.bub-b,.bub-u{animation:bubIn .28s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes bubIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.bub-b{background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 14px 4px;padding:11px 15px;font-size:13px;line-height:1.55;max-width:88%;color:var(--text);}
.bub-u{background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;padding:11px 15px;font-size:13px;line-height:1.55;align-self:flex-end;max-width:75%;}
.bub-opts{display:flex;flex-wrap:wrap;gap:6px;animation:bubIn .3s .05s both;}
.bub-opt{background:transparent;border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;}
.bub-opt:hover{border-color:var(--accent);color:var(--accent);background:#3b82f610;}
.bub-opt.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.bub-opt:disabled{opacity:.45;cursor:default;pointer-events:none;}
.scale-wrap{display:flex;flex-direction:column;gap:8px;animation:bubIn .3s .05s both;}
.scale-btns{display:flex;gap:4px;}
.scale-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;flex-shrink:0;}
.scale-btn:hover{border-color:var(--accent);color:var(--accent);background:#3b82f610;}
.scale-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.scale-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.typing{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 14px 4px;padding:11px 14px;width:fit-content;animation:bubIn .2s both;}
.typing span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:ty .9s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}.typing span:nth-child(3){animation-delay:.3s;}
@keyframes ty{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
.chat-summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;animation:bubIn .3s both;font-size:12px;}
.chat-summary-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:10px;}
.chat-sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:10px;}
.chat-sum-row:last-child{border-bottom:none;}
.chat-sum-label{color:var(--muted);font-size:11px;}
.chat-sum-val{color:var(--text);font-weight:500;font-size:11.5px;}
.chat-sum-val.hi{color:var(--accent2);}
.chat-doctor-card{background:linear-gradient(135deg,#0e1d3a,#091428);border:1px solid #3b82f640;border-radius:12px;padding:14px;animation:bubIn .3s both;display:flex;align-items:center;gap:12px;}
.chat-doc-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.chat-doc-name{font-size:13px;font-weight:600;color:var(--white);margin-bottom:2px;}
.chat-doc-ready{font-size:11px;color:var(--accent2);display:flex;align-items:center;gap:5px;}
.chat-doc-ready::before{content:'';width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-hint{padding:9px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center;background:var(--surface);flex-shrink:0;}
.chat-restart{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 16px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px;align-self:center;}
.chat-restart:hover{border-color:var(--accent2);color:var(--accent2);}

/* ── SECTIONS ── */
.sec-wrap{padding:100px 0;}
.sec-in{max-width:1280px;margin:0 auto;padding:0 56px;}
.sec-lbl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:14px;font-family:'JetBrains Mono',monospace;}
h2{font-family:'Syne',sans-serif;font-size:clamp(30px,4vw,52px);font-weight:800;line-height:1.06;letter-spacing:-.04em;color:var(--white);}
h2 .bl{color:var(--accent);}h2 .gr{color:var(--accent2);}

/* ── FEATURES GRID ── */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:52px;}
.ac{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;position:relative;overflow:hidden;transition:all .22s;}
.ac::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:.3s;}
.ac:hover{border-color:#3b82f640;transform:translateY(-3px);}
.ac:hover::after{opacity:1;}
.ac-i{font-size:26px;margin-bottom:14px;}
.ac h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--white);margin-bottom:8px;}
.ac p{font-size:13px;color:var(--muted);line-height:1.65;}

/* ── HOW IT WORKS ── */
.how-wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:60px;border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.how-steps{padding:40px 36px;display:flex;flex-direction:column;gap:0;border-right:1px solid var(--border);}
.hs{display:flex;gap:16px;padding:22px 0;border-bottom:1px solid var(--border);}
.hs:last-child{border-bottom:none;padding-bottom:0;}
.hs:first-child{padding-top:0;}
.hs-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:22px;flex-shrink:0;padding-top:1px;}
.hs-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--white);margin-bottom:5px;}
.hs-desc{font-size:12.5px;color:var(--muted);line-height:1.6;}
.how-flow{padding:40px 36px;display:flex;flex-direction:column;justify-content:center;}
.hf-label{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:20px;}
.hf-node{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;}
.hf-ic{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.hf-t{font-size:13px;font-weight:600;color:var(--white);}
.hf-s{font-size:11px;color:var(--muted);margin-top:2px;}
.hf-arr{text-align:center;color:var(--border);font-size:14px;margin:3px 0 3px 25px;}

/* ── PRICING ── */
.pg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:52px;}
.pc{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;transition:all .22s;position:relative;}
.pc:hover{transform:translateY(-3px);box-shadow:0 18px 50px #0003;}
.pc.hot{background:linear-gradient(150deg,#0c1a35,#0a1228);border-color:var(--accent);}
.pc-badge{position:absolute;top:20px;right:20px;background:var(--accent);color:#fff;font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 10px;border-radius:20px;font-family:'JetBrains Mono',monospace;}
.pc-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--white);margin-bottom:6px;}
.pc-desc{font-size:12.5px;color:var(--muted);margin-bottom:22px;line-height:1.5;}
.pc-price{margin-bottom:22px;}
.pc-main{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent2);font-weight:500;}
.pc-note{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic;}
.fl{display:flex;flex-direction:column;gap:9px;margin-bottom:26px;}
.fi{display:flex;gap:9px;font-size:12.5px;color:var(--muted);align-items:flex-start;}
.fi b{color:var(--accent2);flex-shrink:0;}
.pc-btn{width:100%;padding:12px;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.pc-btn-o{background:transparent;color:var(--text);border:1px solid var(--border);}
.pc-btn-o:hover{border-color:var(--accent);color:var(--accent);}
.pc-btn-f{background:var(--accent);color:#fff;border:none;}
.pc-btn-f:hover{opacity:.85;}

/* ── FAQ ── */
.faq-layout{display:grid;grid-template-columns:340px 1fr;gap:64px;align-items:start;margin-top:56px;}
.faq-aside-desc{font-size:13.5px;color:var(--muted);line-height:1.8;margin-top:16px;font-weight:300;}
.faq-aside-contact{display:inline-flex;align-items:center;gap:8px;margin-top:28px;padding:10px 18px;border:1px solid var(--border);border-radius:10px;font-size:12.5px;color:var(--muted);text-decoration:none;transition:border-color .2s,color .2s;font-family:'JetBrains Mono',monospace;}
.faq-aside-contact:hover{border-color:var(--accent2);color:var(--accent2);}
.faq-list{display:flex;flex-direction:column;gap:6px;}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .25s,box-shadow .25s;cursor:pointer;}
.faq-item:hover{border-color:#3b82f625;}
.faq-item.open{border-color:#3b82f640;box-shadow:0 4px 32px #3b82f608;}
.faq-q{display:flex;align-items:center;gap:14px;padding:18px 20px;user-select:none;}
.faq-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:24px;flex-shrink:0;}
.faq-item.open .faq-num{color:var(--accent);}
.faq-icon{width:34px;height:34px;border-radius:9px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background .2s,border-color .2s;}
.faq-item.open .faq-icon{background:#3b82f610;border-color:#3b82f635;}
.faq-q-text{flex:1;font-family:'Syne',sans-serif;font-size:14.5px;font-weight:700;color:var(--white);letter-spacing:-.02em;line-height:1.3;}
.faq-chevron{flex-shrink:0;color:var(--muted);width:28px;height:28px;border-radius:7px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1),color .2s,border-color .2s,background .2s;}
.faq-item.open .faq-chevron{transform:rotate(180deg);color:var(--accent);border-color:#3b82f640;background:#3b82f610;}
.faq-a{max-height:0;overflow:hidden;transition:max-height .42s cubic-bezier(.4,0,.2,1);}
.faq-item.open .faq-a{max-height:640px;}
.faq-a-inner{padding:0 20px 20px 72px;border-top:1px solid var(--border);}
.faq-verdict{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;margin-top:16px;margin-bottom:2px;}
.faq-verdict::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.vd-no{background:#f8717112;color:#f87171;border:1px solid #f8717128;}.vd-no::before{background:#f87171;}
.vd-yes{background:#06d6a012;color:var(--accent2);border:1px solid #06d6a028;}.vd-yes::before{background:var(--accent2);}
.faq-a-inner p{font-size:13px;color:var(--muted);line-height:1.78;margin-top:12px;}
.faq-a-inner p strong{color:var(--text);}
.faq-a-inner p em{color:var(--accent2);font-style:normal;}
.faq-highlight{display:flex;gap:10px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:0 10px 10px 0;padding:12px 16px;margin-top:14px;font-size:12.5px;color:var(--muted);line-height:1.65;}
.faq-hl-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.faq-stats{display:flex;gap:0;margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.faq-stat{flex:1;padding:16px 14px;text-align:center;border-right:1px solid var(--border);}
.faq-stat:last-child{border-right:none;}
.faq-stat-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;color:var(--accent2);line-height:1;}
.faq-stat-val span{font-size:13px;color:var(--muted);}
.faq-stat-lbl{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.4;}
.faq-steps{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px;}
.fsm-step{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px;flex:1;min-width:130px;}
.fsm-n{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.fsm-t{font-size:11.5px;color:var(--text);line-height:1.4;}
.fsm-arr{color:var(--muted);font-size:14px;flex-shrink:0;}

/* ── REGISTER ── */
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:stretch;margin-top:52px;}
.reg-steps{display:flex;flex-direction:column;gap:14px;margin-top:28px;}
.rs{display:flex;gap:12px;align-items:flex-start;}
.rs-n{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.rs-t{font-size:12.5px;color:var(--muted);line-height:1.55;}
.rs-t strong{color:var(--white);display:block;font-size:13px;margin-bottom:2px;}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;height:100%;display:flex;flex-direction:column;}
.reg-left{display:flex;flex-direction:column;justify-content:center;}
.fc-tabs{display:flex;border-bottom:1px solid var(--border);}
.fc-tab{flex:1;padding:14px;text-align:center;font-size:13px;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;color:var(--muted);transition:all .15s;border-bottom:2px solid transparent;}
.fc-tab.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface);}
.fc-body{padding:28px;flex:1;display:flex;flex-direction:column;}
.prog{display:flex;gap:5px;margin-bottom:22px;}
.pd{height:3px;flex:1;border-radius:2px;background:var(--border);}
.pd.done{background:var(--accent);}
.lbl{font-size:10.5px;font-weight:500;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px;display:block;}
.inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;transition:border-color .15s;outline:none;margin-bottom:14px;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:#2d3f60;}
select.inp{cursor:pointer;}
.ir{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.chk{display:flex;gap:9px;align-items:flex-start;margin-bottom:18px;}
.chk input{accent-color:var(--accent);margin-top:3px;}
.chk label{font-size:12px;color:var(--muted);line-height:1.5;}
.chk a{color:var(--accent);}
.sub-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;}
.sub-btn:hover{opacity:.85;}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:13px;font-family:'Inter',sans-serif;font-size:14px;cursor:pointer;transition:.15s;flex-shrink:0;width:48px;}

/* ── ANIMATIONS ── */
.rv{opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease;}
.rv.vis{opacity:1;transform:none;}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:1100px){
  .pg3{grid-template-columns:1fr 1fr;gap:14px;}
}
@media(max-width:900px){
  nav{padding:0 16px;height:56px;}
  .nav-logo{font-size:18px;}
  .nav-logo svg{width:28px;height:28px;}
  .nav-right{gap:8px;}
  .theme-wrap{display:none;}
  .btn-ghost,.btn-accent{padding:7px 14px;font-size:12px;}
  .hero{padding:80px 20px 48px;gap:36px;grid-template-columns:1fr;}
  h1{font-size:clamp(32px,8vw,48px);}
  .hero-desc{font-size:14px;max-width:100%;}
  .hero-btns{gap:8px;}
  .btn-big,.btn-big2{padding:12px 20px;font-size:13px;}
  .hero-nums{gap:24px;margin-top:32px;padding-top:28px;}
  .hn-v{font-size:22px;}
  .chat-mock{max-height:420px;width:100%;}
  .sec-wrap{padding:64px 0;}
  .sec-in{padding:0 20px;}
  h2{font-size:clamp(26px,6vw,40px);}
  .ag{grid-template-columns:1fr 1fr;gap:10px;}
  .ac{padding:20px 16px;}
  .ac h3{font-size:14px;}
  .ac p{font-size:12px;}
  .hs-title{font-size:14px;}
  .hs-desc{font-size:12px;}
  .pc{padding:22px 18px;}
  .faq-layout{grid-template-columns:1fr;gap:36px;}
  .faq-a-inner{padding-left:20px;}
  .faq-q{padding:14px 16px;}
  .faq-q-text{font-size:13.5px;}
  .reg-left{order:2;}
  .form-card{order:1;}
  .fc-body{padding:20px 18px;}
}
@media(max-width:600px){
  nav{padding:0 14px;}
  .nav-links{display:none;}
  .nav-logo{font-size:17px;}
  .nav-logo svg{display:none;}
  .lang-btn{padding:4px 8px;font-size:10.5px;}
  .btn-ghost{padding:6px 10px;font-size:11.5px;}
  .hero{padding:72px 14px 40px;gap:28px;}
  h1{font-size:clamp(28px,9vw,40px);}
  .hero-desc{font-size:13.5px;}
  .btn-big,.btn-big2{padding:11px 16px;font-size:13px;border-radius:10px;}
  .hero-btns{flex-direction:column;}
  .hero-btns .btn-big,.hero-btns .btn-big2{width:100%;}
  .hero-nums{flex-wrap:wrap;gap:18px;}
  .hn-v{font-size:20px;}
  .hn-l{font-size:10px;}
  .chat-mock{max-height:360px;}
  .bub-b,.bub-u{font-size:12px;}
  .bub-opt{font-size:11px;padding:6px 12px;}
  .scale-btn{width:28px;height:28px;font-size:11px;}
  .sec-wrap{padding:48px 0;}
  .sec-in{padding:0 14px;}
  h2{font-size:clamp(24px,7.5vw,34px);}
  .ag{grid-template-columns:1fr;}
  .ac{padding:18px 14px;}
  .how-steps,.how-flow{padding:22px 16px;}
  .hs{gap:12px;}
  .how-wrap{grid-template-columns:1fr;}
  .how-steps{border-right:none;border-bottom:1px solid var(--border);}
  .pc{padding:18px 16px;}
  .pc-name{font-size:17px;}
  .pg3{grid-template-columns:1fr;}
  .faq-stats{flex-direction:column;}
  .faq-stat{border-right:none;border-bottom:1px solid var(--border);}
  .faq-stat:last-child{border-bottom:none;}
  .faq-steps{flex-direction:column;}
  .fsm-arr{transform:rotate(90deg);}
  .ir{grid-template-columns:1fr;}
  .fc-tabs{flex-wrap:wrap;}
  .fc-tab{font-size:12px;padding:11px 8px;}
  .reg-grid{grid-template-columns:1fr;}
  footer div{flex-direction:column;gap:6px;text-align:center;}
}

function setLang(lang){
  LANG = lang;
  localStorage.setItem('nexum_lang', lang);
  document.documentElement.lang = lang === 'uk' ? 'uk' : 'en';
  if(lang === 'en') document.body.classList.add('en');
  else document.body.classList.remove('en');
  renderPage();
  initChat();
}

function setTxt(id, val){ const el = document.getElementById(id); if(el) el.textContent = val; }
function setInnerHTML(id, val){ const el = document.getElementById(id); if(el) el.innerHTML = val; }
function rebuildSelect(id, opts, placeholder, selectSecond){
  const sel = document.getElementById(id); if(!sel) return;
  sel.innerHTML = '';
  if(placeholder){ const o=document.createElement('option'); o.value=''; o.textContent=placeholder; sel.appendChild(o); }
  opts.forEach((opt,i) => {
    const o = document.createElement('option'); o.value=opt; o.textContent=opt;
    if(selectSecond && i===1) o.selected=true;
    sel.appendChild(o);
  });
}

function goToDashboard() {
  var remember = localStorage.getItem('nexum_remember');
  var code     = localStorage.getItem('nexum_remember_code');
  var name     = localStorage.getItem('nexum_remember_name') || code;
  if (remember === '1' && code) {
    sessionStorage.setItem('nexum_auth', code);
    sessionStorage.setItem('nexum_name', name);
    location.href = 'dashboard.html';
  } else {
    location.href = 'login.html';
  }
}

function updateLoginBtn() {
  var btn = document.getElementById('btn-login');
  if (!btn) return;
  var remember = localStorage.getItem('nexum_remember');
  var code     = localStorage.getItem('nexum_remember_code');
  var name     = localStorage.getItem('nexum_remember_name') || '';
  if (remember === '1' && code) {
    var firstName = name.split(' ')[0] || code;
    btn.textContent = '👤 ' + firstName + ' →';
    btn.style.borderColor = 'var(--accent2)';
    btn.style.color = 'var(--accent2)';
  } else {
    btn.textContent = t('nav_login');
    btn.style.borderColor = '';
    btn.style.color = '';
  }
}

<script>
const rvEls = document.querySelectorAll('.rv');
const obs = new IntersectionObserver(es => {
  es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('vis'); obs.unobserve(e.target); } });
}, {threshold:.1});
rvEls.forEach(r => obs.observe(r));

function toggleFaq(el){
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(f => f.classList.remove('open'));
  if(!isOpen) el.classList.add('open');
}

function switchReg(t){
  document.querySelector('#tab-clinic').className = 'fc-tab' + (t==='cl'?' on':'');
  document.querySelector('#tab-doctor').className = 'fc-tab' + (t==='dr'?' on':'');
  ['clS1','clS2','clS3','drS1','drS2','drS3'].forEach(id => { const e=document.getElementById(id); if(e) e.style.display='none'; });
  document.getElementById(t+'S1').style.display='block';
  document.getElementById('regOk').style.display='none';
  updProg(1);
}
function rNext(tp,s){
  ['clS1','clS2','clS3','drS1','drS2','drS3'].forEach(id => { const e=document.getElementById(id); if(e) e.style.display='none'; });
  document.getElementById(tp+'S'+s).style.display='block';
  updProg(s);
}
function updProg(s){ for(let i=1;i<=3;i++) document.getElementById('rp'+i).className='pd'+(i<=s?' done':''); }

function submitReg(){
  ['clS1','clS2','clS3','drS1','drS2','drS3'].forEach(id=>{ const e=document.getElementById(id); if(e) e.style.display='none'; });
  document.getElementById('regOk').style.display='block';
  for(let j=1;j<=3;j++) document.getElementById('rp'+j).className='pd done';

  const isClinic = document.getElementById('tab-clinic').classList.contains('on');
  const lines = [t('notify_header'), ''];
  lines.push('Lang: ' + LANG.toUpperCase());
  lines.push('Time: ' + new Date().toLocaleString());
  lines.push('Type: ' + (isClinic ? t('notify_type_clinic') : t('notify_type_doctor')));
  lines.push('');

  if(isClinic){
    const clinic  = document.getElementById('inp-clinic-name')?.value || '—';
    const spec    = document.getElementById('sel-spec')?.value || '—';
    const city    = document.getElementById('inp-city')?.value || '—';
    const docs    = document.getElementById('sel-doctors')?.value || '—';
    const tariff  = document.getElementById('sel-tariff')?.value || '—';
    const contact = document.getElementById('inp-contact')?.value || '—';
    const phone   = document.getElementById('inp-phone-cl')?.value || '—';
    const email   = document.getElementById('inp-email-cl')?.value || '—';
    const source  = document.getElementById('sel-source-cl')?.value || '—';
    lines.push('🏥 ' + clinic);
    lines.push('🩺 ' + spec + ' · 📍 ' + city);
    lines.push('👥 ' + docs + ' ' + t('notify_doctors'));
    lines.push('💰 ' + tariff);
    lines.push('');
    lines.push('👤 ' + contact);
    lines.push('📞 ' + phone);
    lines.push('📧 ' + email);
    lines.push('📌 ' + source);
  } else {
    const fn     = document.getElementById('inp-fn')?.value || '—';
    const ln     = document.getElementById('inp-ln')?.value || '—';
    const spec   = document.getElementById('sel-dr-spec')?.value || '—';
    const clinic = document.getElementById('inp-dr-clinic')?.value || '—';
    const tariff = document.getElementById('sel-dr-tariff')?.value || '—';
    const phone  = document.getElementById('inp-phone-dr')?.value || '—';
    const email  = document.getElementById('inp-email-dr')?.value || '—';
    const tg     = document.getElementById('inp-tg')?.value || '—';
    const source = document.getElementById('sel-source-dr')?.value || '—';
    lines.push('👨‍⚕️ ' + fn + ' ' + ln);
    lines.push('🩺 ' + spec);
    lines.push('🏥 ' + clinic);
    lines.push('💰 ' + tariff);
    lines.push('');
    lines.push('📞 ' + phone);
    lines.push('📧 ' + email);
    lines.push('💬 ' + tg);
    lines.push('📌 ' + source);
  }

  fetch('/api/notify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: lines.join('\n')})
  }).catch(()=>{});
}

function buildDocCount(){
  const sel = document.getElementById('sel-doctors'); if(!sel) return;
  sel.innerHTML = ['1–3','4–10','11–30','30+'].map(v=>`<option>${v}</option>`).join('');
}
buildDocCount();

// ══ INTERACTIVE CHAT ══
const CHAT = { step:0, answers:{}, el:null, prog:null, hint:null };

function initChat(){
  CHAT.el   = document.getElementById('chatMessages');
  CHAT.prog = document.getElementById('chatProgressFill');
  CHAT.hint = document.getElementById('chatHint');
  CHAT.step = 0;
  CHAT.answers = {};
  CHAT.el.innerHTML = '';
  CHAT.prog.style.width = '0%';
  CHAT.hint.textContent = t('chat_hint');
  CHAT.hint.style.opacity = '1';
  runStep(0);
}

function runStep(idx){
  CHAT.step = idx;
  const steps = buildSteps();
  const s = steps[idx];
  if(!s) return;
  setProgress(s.progress||0);
  if(s.type==='auto'){
    playMessages(s.messages, ()=>runStep(s.next));
  } else if(s.type==='options'){
    const msg = s.botMsg.replace('{complaint}', CHAT.answers.complaint||t('cs1_v')[0]);
    addTyping(()=>{ addBotBubble(msg); addOptions(s); });
  } else if(s.type==='scale'){
    addTyping(()=>{ addBotBubble(s.botMsg); addScale(s); });
  } else if(s.type==='summary'){
    addTyping(()=>{
      addBotBubble(t('cs5_thanks'));
      setTimeout(()=>{
        addSummary();
        CHAT.hint.innerHTML = t('chat_done');
        document.getElementById('chat-sub-title').textContent = t('chat_complete');
      }, 400);
    });
  }
}

function buildSteps(){
  return [
    { type:'auto', delay:0, messages:[
      {from:'bot',text:t('cs0_m1')},
      {from:'bot',text:t('cs0_m2')},
      {from:'user',text:t('cs0_m3')},
    ], next:1, progress:0 },
    { type:'options', botMsg:t('cs1_bot'), key:'complaint', options: t('cs1_o').map((label,i)=>({label,val:t('cs1_v')[i]})), progress:20 },
    { type:'options', botMsg:t('cs2_bot'), key:'duration', options: t('cs2_o').map((label,i)=>({label,val:t('cs2_v')[i]})), progress:40 },
    { type:'scale', botMsg:t('cs3_bot'), key:'pain', min:1, max:10, labels:t('cs3_l'), progress:60 },
    { type:'options', botMsg:t('cs4_bot'), key:'allergy', options: t('cs4_o').map((label,i)=>({label,val:t('cs4_v')[i]})), progress:80 },
    { type:'summary', progress:100 },
  ];
}

function playMessages(msgs, cb, i=0){
  if(i>=msgs.length){ setTimeout(cb,300); return; }
  const m=msgs[i];
  setTimeout(()=>{
    if(m.from==='bot') addBotBubble(m.text);
    else addUserBubble(m.text);
    playMessages(msgs, cb, i+1);
  }, i===0?200:500);
}
function addBotBubble(text){ const d=document.createElement('div'); d.className='bub-b'; d.textContent=text; CHAT.el.appendChild(d); scrollChat(); }
function addUserBubble(text){ const d=document.createElement('div'); d.className='bub-u'; d.textContent=text; CHAT.el.appendChild(d); scrollChat(); }
function addTyping(cb){
  const t_=document.createElement('div'); t_.className='typing'; t_.innerHTML='<span></span><span></span><span></span>'; CHAT.el.appendChild(t_); scrollChat();
  setTimeout(()=>{ CHAT.el.removeChild(t_); cb(); scrollChat(); }, 900);
}
function addOptions(step){
  const wrap=document.createElement('div'); wrap.className='bub-opts';
  step.options.forEach(opt=>{
    const b=document.createElement('button'); b.className='bub-opt'; b.textContent=opt.label;
    b.onclick=()=>{
      CHAT.hint.style.opacity='0';
      wrap.querySelectorAll('.bub-opt').forEach(x=>{x.disabled=true;});
      b.classList.add('selected');
      CHAT.answers[step.key]=opt.val;
      setTimeout(()=>{ addUserBubble(opt.label); setTimeout(()=>runStep(CHAT.step+1),400); },200);
    };
    wrap.appendChild(b);
  });
  CHAT.el.appendChild(wrap); scrollChat();
}
function addScale(step){
  const wrap=document.createElement('div'); wrap.className='scale-wrap';
  const btns=document.createElement('div'); btns.className='scale-btns';
  for(let i=step.min;i<=step.max;i++){
    const b=document.createElement('button'); b.className='scale-btn'; b.textContent=i;
    b.onclick=()=>{
      CHAT.hint.style.opacity='0';
      btns.querySelectorAll('.scale-btn').forEach(x=>{x.disabled=true;});
      b.classList.add('selected');
      CHAT.answers[step.key]=i;
      setTimeout(()=>{ addUserBubble(`${t('cs3_ua')}: ${i}/10`); setTimeout(()=>runStep(CHAT.step+1),400); },200);
    };
    btns.appendChild(b);
  }
  const labels=document.createElement('div'); labels.className='scale-labels';
  step.labels.forEach(l=>{ const s=document.createElement('span'); s.textContent=l; labels.appendChild(s); });
  wrap.appendChild(btns); wrap.appendChild(labels); CHAT.el.appendChild(wrap); scrollChat();
}
function addSummary(){
  const pain=CHAT.answers.pain||'—';
  const painColor=pain>=7?'#f87171':pain>=4?'#fbbf24':'#34d399';
  const allergy=CHAT.answers.allergy||'—';
  const allergyColor=allergy!=='Немає'&&allergy!=='None'&&allergy!=='—'?'#f87171':'#34d399';
  const card=document.createElement('div'); card.className='chat-summary';
  card.innerHTML=`<div class="chat-summary-title">${t('sum_title')}</div>
    <div class="chat-sum-row"><span class="chat-sum-label">${t('sum_patient')}</span><span class="chat-sum-val">${t('cs0_m3')}</span></div>
    <div class="chat-sum-row"><span class="chat-sum-label">${t('sum_complaint')}</span><span class="chat-sum-val hi">${CHAT.answers.complaint||'—'}</span></div>
    <div class="chat-sum-row"><span class="chat-sum-label">${t('sum_duration')}</span><span class="chat-sum-val">${CHAT.answers.duration||'—'}</span></div>
    <div class="chat-sum-row"><span class="chat-sum-label">${t('sum_pain')}</span><span class="chat-sum-val" style="color:${painColor}">${pain}/10</span></div>
    <div class="chat-sum-row"><span class="chat-sum-label">${t('sum_allergy')}</span><span class="chat-sum-val" style="color:${allergyColor}">${allergy}</span></div>`;
  CHAT.el.appendChild(card);
  setTimeout(()=>{
    const doc=document.createElement('div'); doc.className='chat-doctor-card';
    doc.innerHTML=`<div class="chat-doc-av">👨‍⚕️</div><div><div class="chat-doc-name">${t('doc_name')}</div><div class="chat-doc-ready">${t('doc_ready')}</div></div>`;
    CHAT.el.appendChild(doc);
    const restart=document.createElement('button'); restart.className='chat-restart'; restart.textContent=t('chat_restart');
    restart.onclick=initChat; CHAT.el.appendChild(restart); scrollChat();
  },600);
  scrollChat();
}
function setProgress(pct){ CHAT.prog.style.width=pct+'%'; }
function scrollChat(){ requestAnimationFrame(()=>{ CHAT.el.scrollTop=CHAT.el.scrollHeight; }); }

document.addEventListener('DOMContentLoaded', ()=>{
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === LANG);
  });
  renderPage();
  initChat();
});
</script>
